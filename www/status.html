<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSIZWENI Status</title>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:linear-gradient(180deg,#0a0a0a,#111);color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding-bottom:70px;text-align:center;}
#status{font-size:24px;font-weight:bold;color:#fff;padding:10px;border-radius:5px;}
.online{background-color:#2ecc71;}
.offline{background-color:#e74c3c;}
.bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:#111;display:flex;justify-content:space-around;padding:10px 0;box-shadow:0 -3px 10px rgba(0,0,0,0.5);z-index:999;border-top:1px solid #444;}
.bottom-nav button{background:none;border:none;color:#ffd700;font-size:16px;display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.bottom-nav button span{font-size:12px;margin-top:2px;}
.bottom-nav button.active{color:#fff;}
</style>
</head>
<body>
<h1>Status ⚡</h1>
<div id="status">Checking...</div>

<div class="bottom-nav">
  <button onclick="window.location.href='index.html'">🏠<span>Home</span></button>
  <button onclick="window.location.href='features.html'">✨<span>Features</span></button>
  <button onclick="window.location.href='more.html'">💡<span>More</span></button>
  <button class="active">⚡<span>Status</span></button>
</div>

<script>
const statusDiv=document.getElementById('status');
function updateStatus(){
  if(navigator.onLine){statusDiv.textContent='You are ONLINE';statusDiv.className='online';}
  else{statusDiv.textContent='You are OFFLINE';statusDiv.className='offline';}
}
window.addEventListener('online',updateStatus);
window.addEventListener('offline',updateStatus);
updateStatus();
</script>
</body>
</html>
